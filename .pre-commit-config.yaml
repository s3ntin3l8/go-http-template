# Blueprint: Standard Go Pre-commit Config
repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict

  - repo: https://github.com/golangci/golangci-lint
    rev: v2.5.0
    hooks:
      - id: golangci-lint
        args: ['--timeout', '5m']

  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        entry: gofmt -l
        language: system
        types: [go]
        pass_filenames: true

      - id: go-vet
        name: go vet
        entry: go vet ./...
        language: system
        types: [go]
        pass_filenames: false

      - id: go-mod-tidy
        name: go mod tidy (check)
        entry: bash -c 'go mod tidy && git diff --exit-code go.mod go.sum'
        language: system
        types: [go]
        pass_filenames: false
        stages: [pre-commit]

      - id: go-test
        name: go test
        entry: go test -race ./...
        language: system
        types: [go]
        pass_filenames: false
        stages: [pre-push]

      - id: govulncheck
        name: govulncheck
        entry: bash -c 'which govulncheck 2>/dev/null && govulncheck ./... || echo "⚠ govulncheck not found — skipping"'
        language: system
        types: [go]
        pass_filenames: false
        stages: [pre-push]
